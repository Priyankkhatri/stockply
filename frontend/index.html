<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta -->
    <title>Stockply — Supply Chain Clarity, Beautifully Delivered</title>
    <meta name="description" content="Stockply is the Digital Atelier for supply chain management. Real-time inventory tracking, intelligent analytics, and seamless logistics for shop owners and suppliers across India." />
    <meta name="keywords" content="inventory management, supply chain, stock tracking, shop owner, supplier, MERN stack, dashboard, analytics, order management, low stock alerts, partner network" />
    <meta name="author" content="Priyank Khatri" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stockply.vercel.app/" />

    <!-- Theme & Favicon -->
    <meta name="theme-color" content="#C08552" />
    <meta name="msapplication-TileColor" content="#C08552" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stockply" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=2" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stockply.vercel.app/" />
    <meta property="og:title" content="Stockply — Supply Chain Clarity, Beautifully Delivered" />
    <meta property="og:description" content="Premium inventory management connecting shop owners and suppliers with real-time tracking and analytics. Built with the MERN stack." />
    <meta property="og:image" content="https://stockply.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Stockply" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Stockply — Supply Chain Clarity, Beautifully Delivered" />
    <meta name="twitter:description" content="Premium inventory management connecting shop owners and suppliers with real-time tracking and analytics." />
    <meta name="twitter:image" content="https://stockply.vercel.app/og-image.png" />
    <meta name="twitter:creator" content="@priyankkhatri" />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Stockply",
      "url": "https://stockply.vercel.app",
      "description": "The Digital Atelier for supply chain management — real-time inventory tracking, intelligent analytics, and seamless logistics.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "author": {
        "@type": "Person",
        "name": "Priyank Khatri",
        "url": "https://github.com/Priyankkhatri"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "500"
      }
    }
    </script>

    <!-- JSON-LD Structured Data: WebSite (for sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Stockply",
      "url": "https://stockply.vercel.app",
      "description": "Supply chain clarity, beautifully delivered.",
      "publisher": {
        "@type": "Person",
        "name": "Priyank Khatri"
      }
    }
    </script>

    <!-- Google Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS Prefetch for API -->
    <link rel="dns-prefetch" href="https://stockply-backend.onrender.com" />
  </head>
  <body>
    <!-- Noscript fallback for SEO bots -->
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: system-ui;">
        <h1>Stockply — Supply Chain Management</h1>
        <p>Stockply connects shop owners and suppliers through premium inventory management. Real-time tracking, intelligent analytics, and seamless logistics.</p>
        <p>Please enable JavaScript to use Stockply.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
